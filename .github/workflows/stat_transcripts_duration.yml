name: stat-transcripts-duration

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: stat-transcripts-duration-${{ github.ref }}
  cancel-in-progress: false

jobs:
  stat:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Calculate transcript stats
        shell: bash
        run: |
          mkdir -p state

          python - <<'PY'
          import csv
          import json
          import re
          from pathlib import Path

          transcript_globs = [
              "transcripts/*.txt",
              "destinations/*/with_timestamps/*.txt",
              "single_videos/*/with_timestamps/*.txt",
              "youtube_channels/*/with_timestamps/*.txt",
          ]
          report_json = Path("state/transcript_stats_report.json")
          report_csv = Path("state/transcript_stats_files.csv")
          summary_md = Path(".summary_transcript_stats.md")

          time_pattern = re.compile(r'^\[(\d{2}:\d{2}(?::\d{2})?(?:\.\d{1,3})?)\s*(?:-|-->)\s*(\d{2}:\d{2}(?::\d{2})?(?:\.\d{1,3})?)\]', re.M)
          title_pattern = re.compile(r'^标题：(.+)$', re.M)
          bvid_pattern = re.compile(r'^BV号：(.+)$', re.M)
          text_line_pattern = re.compile(r'^\[\d{2}:\d{2}(?::\d{2})?(?:\.\d{1,3})?\s*(?:-|-->)\s*\d{2}:\d{2}(?::\d{2})?(?:\.\d{1,3})?\]\s*(.*)$', re.M)

          def hms_to_seconds(s: str) -> int:
              parts = s.split(":")
              if len(parts) == 2:
                  minutes = int(parts[0])
                  seconds = float(parts[1])
                  return int(round(minutes * 60 + seconds))
              hours = int(parts[0])
              minutes = int(parts[1])
              seconds = float(parts[2])
              return int(round(hours * 3600 + minutes * 60 + seconds))

          def seconds_to_hms(sec: int) -> str:
              sec = max(0, int(sec))
              h = sec // 3600
              m = (sec % 3600) // 60
              s = sec % 60
              return f"{h:02d}:{m:02d}:{s:02d}"

          def extract_bvid(text: str):
              m = re.search(r'(BV[0-9A-Za-z]+)', text or "")
              return m.group(1) if m else ""

          def count_cjk_chars(s: str) -> int:
              return len(re.findall(r'[\u4e00-\u9fff]', s))

          def count_all_visible_chars(s: str) -> int:
              return len(re.sub(r'\s+', '', s))

          def transcript_files():
              seen = set()
              files = []
              for pattern in transcript_globs:
                  for path in Path(".").glob(pattern):
                      if not path.is_file():
                          continue
                      key = path.as_posix()
                      if key in seen:
                          continue
                      seen.add(key)
                      files.append(path)
              return sorted(files, key=lambda p: p.as_posix())

          files = transcript_files()

          rows = []
          total_seconds = 0
          total_segments = 0
          total_subtitle_lines = 0
          total_cjk_chars = 0
          total_visible_chars = 0
          files_with_timestamps = 0
          files_without_timestamps = 0

          for path in files:
              content = path.read_text(encoding="utf-8", errors="ignore")
              matches = list(time_pattern.finditer(content))
              subtitle_texts = [m.group(1).strip() for m in text_line_pattern.finditer(content) if m.group(1).strip()]

              title_match = title_pattern.search(content)
              bvid_match = bvid_pattern.search(content)

              duration_sec = 0
              if matches:
                  duration_sec = max(hms_to_seconds(m.group(2)) for m in matches)
                  files_with_timestamps += 1
              else:
                  files_without_timestamps += 1

              joined_text = "".join(subtitle_texts)

              row = {
                  "file_name": path.as_posix(),
                  "bvid": (bvid_match.group(1).strip() if bvid_match else extract_bvid(path.stem)),
                  "title": (title_match.group(1).strip() if title_match else ""),
                  "segments_found": len(matches),
                  "subtitle_lines": len(subtitle_texts),
                  "duration_seconds": duration_sec,
                  "duration_hms": seconds_to_hms(duration_sec),
                  "cjk_chars": count_cjk_chars(joined_text),
                  "visible_chars": count_all_visible_chars(joined_text),
              }
              rows.append(row)

              total_seconds += duration_sec
              total_segments += len(matches)
              total_subtitle_lines += len(subtitle_texts)
              total_cjk_chars += row["cjk_chars"]
              total_visible_chars += row["visible_chars"]

          rows_by_duration_desc = sorted(rows, key=lambda x: x["duration_seconds"], reverse=True)
          rows_with_duration = [x for x in rows if x["duration_seconds"] > 0]

          avg_seconds = int(total_seconds / len(rows_with_duration)) if rows_with_duration else 0
          chars_per_hour = round(total_cjk_chars / (total_seconds / 3600), 2) if total_seconds > 0 else 0
          visible_chars_per_hour = round(total_visible_chars / (total_seconds / 3600), 2) if total_seconds > 0 else 0

          longest = rows_by_duration_desc[0] if rows_by_duration_desc else None
          shortest = min(rows_with_duration, key=lambda x: x["duration_seconds"]) if rows_with_duration else None

          report = {
              "total_files": len(files),
              "files_with_timestamps": files_with_timestamps,
              "files_without_timestamps": files_without_timestamps,
              "total_duration_seconds": total_seconds,
              "total_duration_hms": seconds_to_hms(total_seconds),
              "total_duration_hours": round(total_seconds / 3600, 2),
              "average_duration_seconds": avg_seconds,
              "average_duration_hms": seconds_to_hms(avg_seconds),
              "total_segments": total_segments,
              "total_subtitle_lines": total_subtitle_lines,
              "total_cjk_chars": total_cjk_chars,
              "total_visible_chars": total_visible_chars,
              "cjk_chars_per_hour": chars_per_hour,
              "visible_chars_per_hour": visible_chars_per_hour,
              "longest_file": longest,
              "shortest_file": shortest,
              "top_20_longest_files": rows_by_duration_desc[:20]
          }

          report_json.write_text(
              json.dumps(report, ensure_ascii=False, indent=2),
              encoding="utf-8"
          )

          with report_csv.open("w", encoding="utf-8-sig", newline="") as f:
              writer = csv.DictWriter(
                  f,
                  fieldnames=[
                      "file_name",
                      "bvid",
                      "title",
                      "segments_found",
                      "subtitle_lines",
                      "duration_seconds",
                      "duration_hms",
                      "cjk_chars",
                      "visible_chars"
                  ]
              )
              writer.writeheader()
              writer.writerows(rows_by_duration_desc)

          lines = []
          lines.append("## Transcript stats")
          lines.append("")
          lines.append(f"- Total files: {len(files)}")
          lines.append(f"- Files with timestamps: {files_with_timestamps}")
          lines.append(f"- Files without timestamps: {files_without_timestamps}")
          lines.append(f"- Total duration: {seconds_to_hms(total_seconds)}")
          lines.append(f"- Total duration (hours): {round(total_seconds / 3600, 2)}")
          lines.append(f"- Average duration: {seconds_to_hms(avg_seconds)}")
          lines.append(f"- Total segments: {total_segments}")
          lines.append(f"- Total subtitle lines: {total_subtitle_lines}")
          lines.append(f"- Total CJK chars: {total_cjk_chars}")
          lines.append(f"- Total visible chars: {total_visible_chars}")
          lines.append(f"- CJK chars per hour: {chars_per_hour}")
          lines.append(f"- Visible chars per hour: {visible_chars_per_hour}")
          lines.append("")

          if longest:
              lines.append("### Longest file")
              lines.append("")
              lines.append(f"- File: {longest['file_name']}")
              lines.append(f"- BV: {longest['bvid']}")
              lines.append(f"- Duration: {longest['duration_hms']}")
              lines.append(f"- Segments: {longest['segments_found']}")
              lines.append("")

          if shortest:
              lines.append("### Shortest file")
              lines.append("")
              lines.append(f"- File: {shortest['file_name']}")
              lines.append(f"- BV: {shortest['bvid']}")
              lines.append(f"- Duration: {shortest['duration_hms']}")
              lines.append(f"- Segments: {shortest['segments_found']}")
              lines.append("")

          lines.append("### Top 20 longest files")
          lines.append("")
          lines.append("| file_name | bvid | duration | segments | subtitle_lines | cjk_chars |")
          lines.append("|---|---|---:|---:|---:|---:|")
          for row in rows_by_duration_desc[:20]:
              lines.append(
                  f"| {row['file_name']} | {row['bvid']} | {row['duration_hms']} | {row['segments_found']} | {row['subtitle_lines']} | {row['cjk_chars']} |"
              )

          summary_md.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Show summary in job
        shell: bash
        run: |
          cat .summary_transcript_stats.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: transcript-stats-report
          path: |
            state/transcript_stats_report.json
            state/transcript_stats_files.csv
          if-no-files-found: error
          overwrite: true
